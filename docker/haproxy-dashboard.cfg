global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  120000
    timeout server  120000
    # Required for WebSocket connections to stay open
    timeout tunnel  3600000

frontend dashboard_frontend
    bind *:80
    mode http

    # Preserve the protocol set by an upstream TLS terminator (e.g. Pomerium).
    # If nothing upstream set it, default to https since this frontend is always
    # accessed through a TLS-terminating reverse proxy.
    http-request set-header X-Forwarded-Proto https if !{ hdr(X-Forwarded-Proto) -m found }

    # ACL to detect API requests
    acl is_api path_beg /api

    # ACL to detect WebSocket upgrade requests
    acl is_websocket hdr(Upgrade) -i websocket

    # Route WebSocket API requests to API backend with tunnel support
    use_backend api_backend if is_api is_websocket
    use_backend api_backend if is_api

    # Route everything else to web frontend
    default_backend web_backend

backend api_backend
    mode http
    balance roundrobin
    option forwardfor
    option http-server-close
    # Preserve WebSocket upgrade headers — http-server-close would otherwise
    # replace Connection: Upgrade with Connection: close, breaking WS handshakes.
    http-request set-header Connection Upgrade if { hdr(Upgrade) -i websocket }
    http-request set-header Upgrade websocket if { hdr(Upgrade) -i websocket }
    option httpchk
    http-check send meth GET uri /health ver HTTP/1.1 hdr Host api
    retries 3
    option redispatch
    server api1 api:3001 check inter 5s fall 3 rise 2

backend web_backend
    mode http
    balance roundrobin
    option forwardfor
    retries 3
    option redispatch
    server web1 web:3000 check inter 5s fall 3 rise 2
