name: Release

on:
  push:
    branches: ["main"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.1.0)"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  check-version:
    name: Check Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Determine version
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          MANUAL_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ -n "$RELEASE_TAG" ]]; then
            # Triggered by GitHub Release
            VERSION="${RELEASE_TAG#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
            fi
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "Release publish detected: $RELEASE_TAG"
          elif [[ -n "$MANUAL_VERSION" ]]; then
            # Manual workflow dispatch
            VERSION="${MANUAL_VERSION#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid manual version: $MANUAL_VERSION" >&2
              exit 1
            fi
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              echo "is_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_release=false" >> "$GITHUB_OUTPUT"
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "Manual build with version: $VERSION"
          elif [[ "$COMMIT_MSG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            # Commit message matches version pattern
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "release_tag=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "Release detected from commit: v${BASH_REMATCH[1]}"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "Not a release commit: $COMMIT_MSG"
          fi

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version != ''
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          # Core
          - name: controller
            dockerfile: apps/api/Dockerfile
          - name: console
            dockerfile: apps/web/Dockerfile
          - name: worker
            dockerfile: apps/workers/Dockerfile
          - name: migrator
            dockerfile: docker/db-migrate/Dockerfile
          # Sites extension
          - name: sites-worker
            dockerfile: apps/sites-workers/Dockerfile
          - name: sites-router
            dockerfile: apps/sites-lookup/Dockerfile
          - name: sites-migrator
            dockerfile: docker/sites-db-migrate/Dockerfile
          # Pomerium extension
          - name: pomerium-worker
            dockerfile: apps/pomerium-workers/Dockerfile
          - name: pomerium-migrator
            dockerfile: docker/pomerium-db-migrate/Dockerfile
          # Analytics extension
          - name: analytics
            dockerfile: apps/analytics/Dockerfile
          - name: analytics-worker
            dockerfile: apps/analytics-workers/Dockerfile

    steps:
      - name: Check if image already exists
        id: check-exists
        run: |
          IMAGE="${{ env.DOCKER_USERNAME }}/uni-proxy-${{ matrix.image.name }}"
          TAG="${{ needs.check-version.outputs.version }}"
          if docker manifest inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE}:${TAG} already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE}:${TAG} not found, will build"
          fi

      - name: Checkout code
        if: steps.check-exists.outputs.exists != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU
        if: steps.check-exists.outputs.exists != 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        if: steps.check-exists.outputs.exists != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Docker Hub
        if: steps.check-exists.outputs.exists != 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.image.name }}
        if: steps.check-exists.outputs.exists != 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/uni-proxy-${{ matrix.image.name }}:${{ needs.check-version.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/uni-proxy-${{ matrix.image.name }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, build-and-push]
    if: needs.check-version.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          tag_name: ${{ needs.check-version.outputs.release_tag }}
          name: ${{ needs.check-version.outputs.release_tag }}
          generate_release_notes: true
          body: |
            ## Docker Images

            ### Core
            ```bash
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-controller:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-console:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-worker:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-migrator:${{ needs.check-version.outputs.version }}
            ```

            ### Sites Extension
            ```bash
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-sites-worker:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-sites-router:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-sites-migrator:${{ needs.check-version.outputs.version }}
            ```

            ### Pomerium Extension
            ```bash
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-pomerium-worker:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-pomerium-migrator:${{ needs.check-version.outputs.version }}
            ```

            ### Analytics Extension
            ```bash
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-analytics:${{ needs.check-version.outputs.version }}
            docker pull ${{ env.DOCKER_USERNAME }}/uni-proxy-analytics-worker:${{ needs.check-version.outputs.version }}
            ```

            Or use the `latest` tags for all images.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [check-version, build-and-push]
    if: needs.check-version.outputs.version != ''
    steps:
      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${{ needs.check-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Core Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-controller\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-console\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-worker\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-migrator\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sites Extension Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-sites-worker\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-sites-router\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-sites-migrator\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pomerium Extension Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-pomerium-worker\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-pomerium-migrator\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analytics Extension Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-analytics\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_USERNAME }}/uni-proxy-analytics-worker\`" >> $GITHUB_STEP_SUMMARY
