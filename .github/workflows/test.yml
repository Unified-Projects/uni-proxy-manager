name: Test Suite

on:
    push:
        branches: [main, develop]
        paths-ignore:
            - "**/*.md"
            - "docs/**"
            - "LICENSE*"
            - ".vscode/**"
            - ".editorconfig"
    pull_request:
        paths-ignore:
            - "**/*.md"
            - "docs/**"
            - "LICENSE*"
            - ".vscode/**"
            - ".editorconfig"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-typecheck:
        name: Lint & Type Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install pnpm
              uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: pnpm type-check

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: lint-and-typecheck
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install pnpm
              uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Run unit tests
              run: pnpm test

    integration-tests:
        name: Integration Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: unit-tests
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install pnpm
              uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Prepare integration test fixtures
              run: |
                  mkdir -p docker/test-data/analytics-website
                  mkdir -p docker/test-data/dex
                  mkdir -p docker/test-data/nginx
                  mkdir -p docker/test-data/pomerium
                  cat > docker/test-data/nginx/index.html <<'EOF'
                  <html><body><h1>Test Backend</h1></body></html>
                  EOF
                  cat > docker/test-data/dex/config.yaml <<'EOF'
                  issuer: http://test-dex:5556/dex
                  storage:
                    type: memory
                  web:
                    http: 0.0.0.0:5556
                  telemetry:
                    http: 0.0.0.0:5558
                  oauth2:
                    skipApprovalScreen: true
                    responseTypes: ["code", "token", "id_token"]
                    alwaysShowLoginScreen: false
                    passwordConnector: local
                  logger:
                    level: "debug"
                    format: "text"
                  staticClients:
                    - id: pomerium-test
                      name: Pomerium Test Client
                      secret: pomerium-test-secret
                      redirectURIs:
                        - http://localhost:5080/oauth2/callback
                        - http://localhost:5443/oauth2/callback
                        - http://test-pomerium/oauth2/callback
                        - http://test-pomerium:80/oauth2/callback
                    - id: test-client
                      name: Integration Test Client
                      secret: test-client-secret
                      redirectURIs:
                        - http://localhost:3000/callback
                        - http://localhost:3001/callback
                        - http://localhost:3010/callback
                        - http://127.0.0.1:3000/callback
                        - http://127.0.0.1:3001/callback
                        - http://127.0.0.1:3010/callback
                    - id: test-public-client
                      name: Public Test Client
                      public: true
                      redirectURIs:
                        - http://localhost:3000/callback
                        - http://localhost:3010/callback
                  enablePasswordDB: true
                  staticPasswords:
                    - email: admin@test.local
                      hash: $2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W
                      username: admin
                      userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
                    - email: user@test.local
                      hash: $2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W
                      username: user
                      userID: "41331323-6f44-45e6-b3b9-2c4c48c8a6fb"
                    - email: blocked@test.local
                      hash: $2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W
                      username: blocked
                      userID: "59b38d79-8c67-45f2-bf94-2c4c48c8a6fc"
                    - email: employee@company.test
                      hash: $2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W
                      username: employee
                      userID: "72c49e8a-1234-5678-9abc-def012345678"
                    - email: external@external.test
                      hash: $2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W
                      username: external
                      userID: "83d50f9b-2345-6789-abcd-ef0123456789"
                  connectors: []
                  EOF
                  cat > docker/test-data/pomerium/config.yaml <<'EOF'
                  authenticate_service_url: http://test-pomerium:80
                  cookie_name: _pomerium_test
                  cookie_expire: 14h
                  cookie_secure: false
                  cookie_http_only: true
                  log_level: debug
                  routes:
                    - from: http://test-pomerium
                      to: http://test-backend:80
                      prefix: /route/public
                      prefix_rewrite: /
                      allow_public_unauthenticated_access: true
                    - from: http://test-pomerium
                      to: http://test-backend:80
                      prefix: /route/app
                      prefix_rewrite: /
                      allow_any_authenticated_user: true
                      pass_identity_headers: true
                  EOF
                  cat > docker/test-data/pomerium/policy.yaml <<'EOF'
                  address: ":80"
                  insecure_server: true
                  shared_secret: f/kPSvzhrJlN6XJmZWdtjBX4zDnGBysYuSdmSqlV178=
                  cookie_secret: BETGZRnPwK9fo2oiXRNRDfzMnxGW4kQsDpySAqdEscI=
                  signing_key: 
                  authenticate_service_url: http://test-pomerium:80
                  cookie_name: _pomerium
                  cookie_expire: 14h
                  cookie_http_only: true
                  cookie_secure: false
                  log_level: info
                  idp_provider: oidc
                  idp_client_id: pomerium-e2e
                  idp_client_secret: pomerium-e2e-secret
                  idp_provider_url: http://test-dex:5556/dex
                  idp_scopes:
                    - openid
                    - email
                    - profile
                  routes:
                    - from: https://e2e-platform.test.local
                      to: http://10.0.1.100:8080
                      policy:
                        - allow:
                            or:
                              - email:
                                  is: admin@test.local
                      preserve_host_header: true
                      pass_identity_headers: true
                      set_request_headers:
                        X-Forwarded-Proto: https
                  EOF
                  cat > docker/test-data/analytics-website/index.html <<'EOF'
                  <!DOCTYPE html>
                  <html lang="en">
                  <head>
                    <meta charset="UTF-8">
                    <title>Test Website Home</title>
                    <script src="script.js"></script>
                  </head>
                  <body>
                    <h1>Test Website Home</h1>
                    <p>This page is used for integration testing of the analytics pipeline.</p>
                  </body>
                  </html>
                  EOF
                  cat > docker/test-data/analytics-website/about.html <<'EOF'
                  <!DOCTYPE html>
                  <html lang="en">
                  <head>
                    <meta charset="UTF-8">
                    <title>Test Website About</title>
                  </head>
                  <body>
                    <h1>Test Website About</h1>
                    <p>About page for analytics integration testing.</p>
                  </body>
                  </html>
                  EOF
                  cat > docker/test-data/analytics-website/noscript.html <<'EOF'
                  <!DOCTYPE html>
                  <html lang="en">
                  <head>
                    <meta charset="UTF-8">
                    <title>Test Website Noscript</title>
                  </head>
                  <body>
                    <h1>Test Website Noscript</h1>
                    <noscript><img src="pixel.gif" width="1" height="1" alt="" /></noscript>
                  </body>
                  </html>
                  EOF

            - name: Start Docker test environment
              run: |
                  pnpm test:docker:down 2>/dev/null || true
                  pnpm test:docker:up

            - name: Run integration suite (equivalent to run-tests.sh --all integration path)
              run: docker exec -e SKIP_URT_TESTS=true uni-proxy-manager-test-runner pnpm exec vitest run --config vitest.config.integration.ts

            - name: Debug Docker Services On Failure
              if: failure()
              run: |
                  docker compose -f docker/docker-compose.test.yml ps
                  docker logs uni-proxy-manager-test-dex || true
                  docker logs uni-proxy-manager-test-backend || true
                  docker logs uni-proxy-manager-test-haproxy || true
                  docker logs uni-proxy-manager-test-db-migrate || true

            - name: Cleanup
              if: always()
              run: docker compose -f docker/docker-compose.test.yml down -v --remove-orphans

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
              with:
                  name: integration-test-results
                  path: |
                      test-results/
                      coverage/
                  retention-days: 7

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: integration-tests
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install pnpm
              uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Cache Playwright browsers
              uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
              with:
                  path: |
                      ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-${{ runner.os }}-

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium firefox webkit

            - name: Run E2E tests
              run: pnpm test:e2e

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

            - name: Upload test screenshots
              if: failure()
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
              with:
                  name: e2e-screenshots
                  path: test-results/
                  retention-days: 7

    e2e-real-tests:
        name: Real E2E Tests (with URT-Executor)
        runs-on: ubuntu-latest
        timeout-minutes: 45
        needs: integration-tests
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install pnpm
              uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Create storage directories
              run: |
                  sudo mkdir -p /tmp/uni-proxy-e2e/functions
                  sudo mkdir -p /tmp/uni-proxy-e2e/builds
                  sudo mkdir -p /tmp/uni-proxy-e2e/sites
                  sudo chmod -R 777 /tmp/uni-proxy-e2e

            - name: Create E2E test data directories
              run: |
                  mkdir -p tests/e2e-real/setup/e2e-test-data/haproxy
                  mkdir -p tests/e2e-real/setup/e2e-test-data/certificates
                  mkdir -p tests/e2e-real/setup/e2e-test-data/error-pages
                  mkdir -p tests/e2e-real/setup/e2e-test-data/sites
                  # Create minimal HAProxy config
                  echo "global" > tests/e2e-real/setup/e2e-test-data/haproxy/haproxy.cfg
                  echo "  log stdout format raw local0" >> tests/e2e-real/setup/e2e-test-data/haproxy/haproxy.cfg
                  echo "defaults" >> tests/e2e-real/setup/e2e-test-data/haproxy/haproxy.cfg
                  echo "  mode http" >> tests/e2e-real/setup/e2e-test-data/haproxy/haproxy.cfg

            - name: Start E2E environment
              run: docker compose -f tests/e2e-real/setup/docker-compose.e2e.yml up -d --build

            - name: Wait for services
              run: |
                  echo "Waiting for services to be ready..."
                  timeout 120 bash -c 'until curl -sf http://127.0.0.1:3099/health; do sleep 2; done'
                  timeout 120 bash -c 'until curl -sf -H "authorization: Bearer e2e-test-executor-secret" http://127.0.0.1:8080/v1/health; do sleep 2; done'
                  echo "Services are ready!"

            - name: Run real E2E tests
              run: pnpm test:e2e-real
              env:
                  E2E_API_URL: http://127.0.0.1:3099
                  E2E_EXECUTOR_URL: http://127.0.0.1:8080
                  E2E_EXECUTOR_SECRET: e2e-test-executor-secret

            - name: Collect logs on failure
              if: failure()
              run: |
                  docker compose -f tests/e2e-real/setup/docker-compose.e2e.yml logs > e2e-real-logs.txt 2>&1

            - name: Upload logs on failure
              if: failure()
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
              with:
                  name: e2e-real-logs
                  path: e2e-real-logs.txt
                  retention-days: 7

            - name: Cleanup
              if: always()
              run: |
                  docker compose -f tests/e2e-real/setup/docker-compose.e2e.yml down -v --remove-orphans
                  sudo rm -rf /tmp/uni-proxy-e2e
